<!-- lightbox -->
<div id="lightbox"><button id="lb-close">&times;</button><img id="lb-img" src="" alt=""></div>
<script>
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
document.querySelectorAll('.apartment-full img').forEach(img => {
  img.style.cursor = 'zoom-in';
  img.addEventListener('click', () => {
    lbImg.src = img.src.replace(/&width=\d+/, '&width=2000');
    lb.classList.add('open');
  });
});
document.getElementById('lb-close').onclick = () => lb.classList.remove('open');
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
</script>
